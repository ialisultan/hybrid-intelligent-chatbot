services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid-chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: hybrid-chatbot-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-chatbot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
      VECTOR_STORE_BACKEND: qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  streamlit:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hybrid-chatbot-streamlit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_URL: http://app:8000
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
